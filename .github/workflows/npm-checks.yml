name: npm-checks

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  GCX_VERSION: 0.4.3
  GRAFANA_NAMESPACE: stacks-1030830

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Format
        run: npm run format

      - name: Lint
        run: npm run lint

      - name: Assist
        run: npm run assist

      - name: Build
        run: npm run build

      - name: Install gcx
        run: |
          curl -fsSL "https://github.com/grafana/gcx/releases/download/v${GCX_VERSION}/gcx_${GCX_VERSION}_linux_amd64.tar.gz" -o "/tmp/gcx_${GCX_VERSION}_linux_amd64.tar.gz"
          curl -fsSL "https://github.com/grafana/gcx/releases/download/v${GCX_VERSION}/gcx_${GCX_VERSION}_checksums.txt" -o "/tmp/gcx_${GCX_VERSION}_checksums.txt"
          cd /tmp
          grep "  gcx_${GCX_VERSION}_linux_amd64.tar.gz$" "gcx_${GCX_VERSION}_checksums.txt" | sha256sum -c -
          tar -xzf "gcx_${GCX_VERSION}_linux_amd64.tar.gz" -C /tmp
          install -m 0755 /tmp/gcx /usr/local/bin/gcx
          gcx --version

      - name: Validate
        env:
          GRAFANA_SERVER: ${{ secrets.GRAFANA_SERVER }}
          GRAFANA_TOKEN: ${{ secrets.GRAFANA_TOKEN }}
        run: npm run validate

  push:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install gcx
        run: |
          curl -fsSL "https://github.com/grafana/gcx/releases/download/v${GCX_VERSION}/gcx_${GCX_VERSION}_linux_amd64.tar.gz" -o "/tmp/gcx_${GCX_VERSION}_linux_amd64.tar.gz"
          curl -fsSL "https://github.com/grafana/gcx/releases/download/v${GCX_VERSION}/gcx_${GCX_VERSION}_checksums.txt" -o "/tmp/gcx_${GCX_VERSION}_checksums.txt"
          cd /tmp
          grep "  gcx_${GCX_VERSION}_linux_amd64.tar.gz$" "gcx_${GCX_VERSION}_checksums.txt" | sha256sum -c -
          tar -xzf "gcx_${GCX_VERSION}_linux_amd64.tar.gz" -C /tmp
          install -m 0755 /tmp/gcx /usr/local/bin/gcx
          gcx --version

      - name: Push resources
        env:
          GRAFANA_SERVER: ${{ secrets.GRAFANA_SERVER }}
          GRAFANA_TOKEN: ${{ secrets.GRAFANA_TOKEN }}
        run: gcx resources push
